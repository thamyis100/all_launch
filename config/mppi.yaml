planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      use_holonomic_motion: true
      allow_unknown: true
      costmap_downsampling: 1
      max_iterations: 50000
      max_planning_time: 1.0
      allow_initial_traversal: false


velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [1.0, 1.0, 1.8]
    min_velocity: [-1.0, -1.0, -1.8]
    max_accel: [2.5, 2.5, 3.2]
    max_decel: [-2.5, -2.5, -3.2]
    odom_topic: "/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0


docking_server:
  ros__parameters:
    enable_stamped_cmd_vel: false
    controller_frequency: 20.0
    initial_perception_timeout: 12.0
    wait_charge_timeout: 2.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.10
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    odom_topic: "odom"
    odom_duration: 0.3
    dock_backwards: true
    dock_prestaging_tolerance: 0.5
    introspection_mode: "disabled"

    dock_plugins: ["simple_charging_dock"]
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      docking_threshold: 0.6
      staging_x_offset: 0.60
      staging_yaw_offset: 0.0
      use_external_detection_pose: true
      subscribe_toggle: false
      use_battery_status: false
      use_stall_detection: false
      external_detection_timeout: 6.0
      external_detection_translation_x: -0.3
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: -1.57
      external_detection_rotation_pitch: -1.57
      external_detection_rotation_yaw: 0.0
      filter_coef: 0.2

    docks: ["dummy_dock"]
    dummy_dock:
      type: "simple_charging_dock"
      frame: map
      pose: [0.0, 0.0, 0.0]

    controller:
      k_phi: 3.0
      k_delta: 2.0
      beta: 0.4
      lambda: 2.0
      v_linear_min: 0.05
      v_linear_max: 0.2
      v_angular_max: 0.30
      slowdown_radius: 0.45
      use_collision_detection: true
      costmap_topic: "local_costmap/costmap_raw"
      footprint_topic: "local_costmap/published_footprint"
      transform_tolerance: 0.1
      projection_time: 2.0
      simulation_time_step: 0.1
      dock_collision_threshold: 0.0
